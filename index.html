  <script>
    /* ==========================================
       PARTICLES — Full screen + cursor reactive
       ========================================== */
    const canvas = document.getElementById('particles');
    const ctx = canvas.getContext('2d');
    let W, H;
    let mouse = { x: -9999, y: -9999, active: false };

function resize() {
  // Используем clientWidth, чтобы не считать ширину полосы прокрутки
  W = canvas.width = document.documentElement.clientWidth;
  H = canvas.height = document.documentElement.clientHeight;
}
// Вызываем один раз сразу
resize();

// И добавь небольшую задержку при ресайзе окна, 
// чтобы браузер успел пересчитать стили
window.addEventListener('resize', () => {
  clearTimeout(window.resizeTimer);
  window.resizeTimer = setTimeout(resize, 100);
});

    document.addEventListener('mousemove', e => {
      mouse.x = e.clientX;
      mouse.y = e.clientY;
      mouse.active = true;
    });
    document.addEventListener('mouseleave', () => { mouse.active = false; });

    const COLS = [
      { r:91,  g:206, b:250 },
      { r:245, g:169, b:184 },
      { r:255, g:255, b:255 },
      { r:91,  g:206, b:250 },
      { r:245, g:169, b:184 },
    ];

    class P {
      constructor() { this.init(); }
      init() {
        this.x = Math.random() * W;
        this.y = Math.random() * H;
        this.sz = Math.random() * 2.8 + 0.8;
        this.bsz = this.sz;
        this.vx = (Math.random() - 0.5) * 0.25;
        this.vy = (Math.random() - 0.5) * 0.2;
        this.c = COLS[Math.floor(Math.random() * COLS.length)];
        this.a = Math.random() * 0.55 + 0.15;
        this.ba = this.a;
        this.ph = Math.random() * Math.PI * 2;
        this.ps = Math.random() * 0.02 + 0.005;
        this.glow = this.sz * (4 + Math.random() * 5);
      }
      update() {
        this.ph += this.ps;
        this.x += this.vx + Math.sin(this.ph * 0.6) * 0.12;
        this.y += this.vy + Math.cos(this.ph * 0.8) * 0.08;
        this.a = this.ba + Math.sin(this.ph) * 0.18;
        this.sz = this.bsz + Math.sin(this.ph * 1.2) * 0.7;

        /* CURSOR REACTION */
        if (mouse.active) {
          const dx = mouse.x - this.x;
          const dy = mouse.y - this.y;
          const d = Math.sqrt(dx * dx + dy * dy);
          if (d < 250) {
            const f = (250 - d) / 250;
            /* Attract gently */
            this.vx += (dx / d) * f * 0.06;
            this.vy += (dy / d) * f * 0.06;
            /* Make brighter & bigger near cursor */
            this.a = Math.min(1, this.ba + f * 0.6);
            this.sz = this.bsz + f * 4;
            this.glow = (this.bsz + f * 4) * (5 + f * 8);
          }
        }

        /* Friction */
        this.vx *= 0.985;
        this.vy *= 0.985;

        /* Wrap */
        if (this.x < -40) this.x = W + 30;
        if (this.x > W + 40) this.x = -30;
        if (this.y < -40) this.y = H + 30;
        if (this.y > H + 40) this.y = -30;
      }
      draw() {
        const a = Math.max(0, this.a);
        /* Glow */
        const g = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.glow);
        g.addColorStop(0, `rgba(${this.c.r},${this.c.g},${this.c.b},${a * 0.4})`);
        g.addColorStop(0.3, `rgba(${this.c.r},${this.c.g},${this.c.b},${a * 0.1})`);
        g.addColorStop(1, `rgba(${this.c.r},${this.c.g},${this.c.b},0)`);
        ctx.fillStyle = g;
        ctx.fillRect(this.x - this.glow, this.y - this.glow, this.glow * 2, this.glow * 2);
        /* Core */
        ctx.beginPath();
        ctx.arc(this.x, this.y, Math.max(0.3, this.sz), 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${this.c.r},${this.c.g},${this.c.b},${a})`;
        ctx.fill();
      }
    }

    const N = 140;
    const ps = [];
    for (let i = 0; i < N; i++) ps.push(new P());

    function drawLines() {
      for (let i = 0; i < ps.length; i++) {
        let links = 0; // <-- ДОБАВЛЕНО: счетчик связей
        for (let j = i + 1; j < ps.length; j++) {
          const dx = ps[i].x - ps[j].x;
          const dy = ps[i].y - ps[j].y;
          const d = Math.sqrt(dx * dx + dy * dy);
          
          if (d < 110) {
            links++;
            if (links > 5) break; // <-- ОГРАНИЧЕНИЕ: не больше 5 линий от одной частицы

            const al = (1 - d / 110) * 0.15;
            
            // <-- УБРАНО: тяжелый расчет градиентов
            // Вывод сплошным цветом рисуется видеокартой в десятки раз быстрее
            ctx.beginPath();
            ctx.moveTo(ps[i].x, ps[i].y);
            ctx.lineTo(ps[j].x, ps[j].y);
            ctx.strokeStyle = `rgba(${ps[i].c.r}, ${ps[i].c.g}, ${ps[i].c.b}, ${al})`; 
            ctx.lineWidth = 0.5;
            ctx.stroke();
          }
        }
      }
      
      /* Lines to cursor */
      if (mouse.active) {
        for (let i = 0; i < ps.length; i++) {
          const dx = mouse.x - ps[i].x;
          const dy = mouse.y - ps[i].y;
          const d = Math.sqrt(dx * dx + dy * dy);
          if (d < 200) {
            const al = (1 - d / 200) * 0.18;
            ctx.beginPath();
            ctx.moveTo(ps[i].x, ps[i].y);
            ctx.lineTo(mouse.x, mouse.y);
            ctx.strokeStyle = `rgba(${ps[i].c.r}, ${ps[i].c.g}, ${ps[i].c.b}, ${al})`;
            ctx.lineWidth = 0.6;
            ctx.stroke();
          }
        }
      }
    }

    /* Spawn burst particles on click */
    document.addEventListener('click', e => {
      for (let i = 0; i < 8; i++) {
        const p = new P();
        p.x = e.clientX;
        p.y = e.clientY;
        p.vx = (Math.random() - 0.5) * 3;
        p.vy = (Math.random() - 0.5) * 3;
        p.sz = Math.random() * 3 + 1.5;
        p.bsz = p.sz;
        p.a = 0.9;
        p.ba = 0.5;
        p.glow = p.sz * 8;
        ps.push(p);
      }
      /* Keep count manageable */
      while (ps.length > N + 40) ps.shift();
    });

    function loop() {
      ctx.clearRect(0, 0, W, H);
      ps.forEach(p => { p.update(); p.draw(); });
      drawLines();
      requestAnimationFrame(loop);
    }
    loop();

    /* ==========================================
       CURSOR GLOW — smooth follow
       ========================================== */
    const glow = document.getElementById('cursorGlow');
    let gX = 0, gY = 0, tX = 0, tY = 0;
    document.addEventListener('mousemove', e => { tX = e.clientX; tY = e.clientY; });
    (function glowLoop() {
      gX += (tX - gX) * 0.07;
      gY += (tY - gY) * 0.07;
      glow.style.transform = `translate(${gX - 200}px, ${gY - 200}px)`;
      requestAnimationFrame(glowLoop);
    })();

    /* ==========================================
       LINK HOVER — dynamic shine position
       ========================================== */
    document.querySelectorAll('.link').forEach(link => {
      link.addEventListener('mousemove', e => {
        const r = link.getBoundingClientRect();
        const x = e.clientX - r.left;
        const y = e.clientY - r.top;
        link.style.setProperty('--mx', x + 'px');
        link.style.setProperty('--my', y + 'px');
      });
    });

    /* ==========================================
       LINK ENTRANCE
       ========================================== */
    const obs = new IntersectionObserver(entries => {
      entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('vis'); });
    }, { threshold: 0.05 });
    document.querySelectorAll('.link').forEach(el => obs.observe(el));
  </script>
